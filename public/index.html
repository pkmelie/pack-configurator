<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07070f; --surface: #0f0f1a; --surface2: #181828; --border: #252535;
  --accent: #6d4aff; --accent2: #b06dff; --green: #3ddc84;
  --text: #eeeef5; --muted: #5e5e78; --card-sel: #150e2e;
}
body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:100; opacity:0.5; }
.bg-glow { position:fixed; inset:0; pointer-events:none; z-index:0; transition:background 0.9s ease; }
.loader-screen { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; background:var(--bg); flex-direction:column; gap:14px; }
.spinner { width:34px; height:34px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loader-text { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.1em; }
.app { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; }
.hidden { display:none !important; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 32px; border-bottom:1px solid var(--border); flex-shrink:0; backdrop-filter:blur(12px); background:rgba(7,7,15,0.8); gap:16px; }
.brand { display:flex; align-items:center; gap:9px; flex-shrink:0; }
.brand-icon { width:26px; height:26px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; }
.brand-name { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.stepper { display:flex; align-items:center; overflow-x:auto; flex:1; justify-content:center; }
.stepper::-webkit-scrollbar { display:none; }
.step { display:flex; align-items:center; gap:6px; cursor:pointer; padding:3px 8px; border-radius:20px; transition:all 0.2s; flex-shrink:0; }
.step-dot { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); transition:all 0.3s; flex-shrink:0; }
.step.active .step-dot { border-color:var(--accent); background:var(--accent); color:#fff; box-shadow:0 0 10px rgba(109,74,255,0.5); }
.step.done .step-dot { border-color:var(--green); background:var(--green); color:#000; }
.step-label { font-size:11px; font-weight:600; color:var(--muted); white-space:nowrap; }
.step.active .step-label { color:var(--text); }
.step.done .step-label { color:var(--green); }
.step-sep { width:18px; height:1px; background:var(--border); flex-shrink:0; }
.pages { flex:1; position:relative; overflow:hidden; }
.page { position:absolute; inset:0; display:flex; opacity:0; pointer-events:none; transition:opacity 0.4s ease,transform 0.4s ease; transform:translateX(50px); }
.page.active { opacity:1; pointer-events:all; transform:translateX(0); }
.page.exit { opacity:0; transform:translateX(-50px); pointer-events:none; }
.page-summary { overflow-y:auto; justify-content:center; }
.page-left { width:50%; display:flex; flex-direction:column; padding:36px 44px; overflow-y:auto; }
.page-right { width:50%; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.page-index { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:9px; }
.page-title { font-size:clamp(24px,3vw,38px); font-weight:800; letter-spacing:-0.02em; line-height:1.1; margin-bottom:8px; }
.page-desc { font-size:13px; color:var(--muted); line-height:1.65; margin-bottom:24px; }
.options-list { display:flex; flex-direction:column; gap:8px; flex:1; }
.opt-card { display:flex; align-items:center; gap:12px; padding:13px 16px; border:1.5px solid var(--border); border-radius:10px; cursor:pointer; transition:all 0.18s; background:var(--surface); user-select:none; position:relative; overflow:hidden; }
.opt-card::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(109,74,255,0.07),transparent); opacity:0; transition:opacity 0.2s; }
.opt-card:hover { border-color:rgba(109,74,255,0.4); transform:translateX(4px); }
.opt-card:hover::before { opacity:1; }
.opt-card.selected { border-color:var(--accent); background:var(--card-sel); box-shadow:inset 0 0 30px rgba(109,74,255,0.07); transform:translateX(4px); }
.opt-card.selected::before { opacity:1; }
.opt-icon { font-size:24px; flex-shrink:0; width:38px; text-align:center; }
.opt-body { flex:1; }
.opt-label { font-size:14px; font-weight:700; margin-bottom:2px; }
.opt-val { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); }
.opt-card.selected .opt-val { color:var(--accent2); }
.opt-radio { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.opt-card.selected .opt-radio { border-color:var(--accent); background:var(--accent); box-shadow:0 0 8px rgba(109,74,255,0.5); }
.opt-card.selected .opt-radio::after { content:''; display:block; width:5px; height:5px; background:#fff; border-radius:50%; }
.video-wrapper { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
.video-area { flex:1; position:relative; background:#000; overflow:hidden; min-height:0; }
.video-area video, .video-area iframe { width:100%; height:100%; object-fit:cover; display:block; }
.video-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); background:linear-gradient(135deg,#0a0a18,#0f0f22); }
.video-play-btn { width:56px; height:56px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:20px; }
.video-placeholder p { font-size:11px; letter-spacing:0.04em; font-family:'Space Mono',monospace; }
.video-meta { padding:14px 18px; border-top:1px solid var(--border); flex-shrink:0; }
.video-lbl { font-family:'Space Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:4px; }
.video-title-text { font-size:13px; font-weight:700; margin-bottom:2px; }
.video-desc-text { font-size:11px; color:var(--muted); line-height:1.5; }
.page-nav { display:flex; align-items:center; justify-content:space-between; padding:14px 32px; border-top:1px solid var(--border); backdrop-filter:blur(12px); background:rgba(7,7,15,0.8); flex-shrink:0; }
.nav-info { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); }
.nav-info span { color:var(--text); }
.nav-btns { display:flex; gap:8px; }
.btn-back { background:transparent; border:1.5px solid var(--border); color:var(--muted); border-radius:9px; cursor:pointer; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; padding:10px 22px; transition:all 0.2s; }
.btn-back:hover { border-color:var(--text); color:var(--text); }
.btn-next { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:#fff; border-radius:9px; cursor:pointer; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; padding:10px 26px; transition:all 0.2s; }
.btn-next:hover { opacity:0.85; transform:translateY(-1px); box-shadow:0 6px 20px rgba(109,74,255,0.35); }
.summary-wrap { width:100%; max-width:820px; padding:36px 40px; margin:0 auto; }
.summary-wrap h1 { font-size:clamp(26px,4vw,40px); font-weight:800; letter-spacing:-0.03em; margin-bottom:6px; background:linear-gradient(135deg,#fff 50%,var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.summary-sub { color:var(--muted); font-size:13px; margin-bottom:28px; }
.pack-name-row { display:flex; align-items:center; gap:12px; margin-bottom:22px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 16px; }
.pack-name-row label { font-family:'Space Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); white-space:nowrap; }
.pack-name-row input { flex:1; background:transparent; border:none; color:var(--text); font-family:'Syne',sans-serif; font-size:14px; font-weight:700; outline:none; }
.summary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; margin-bottom:24px; }
.sum-card { padding:14px 16px; border:1px solid var(--border); border-radius:10px; background:var(--surface); cursor:pointer; transition:all 0.2s; }
.sum-card:hover { border-color:rgba(109,74,255,0.35); transform:translateY(-2px); }
.sum-card.ok { border-color:rgba(61,220,132,0.3); background:rgba(61,220,132,0.05); }
.sum-cat { font-family:'Space Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.sum-check { color:var(--green); }
.sum-icon { font-size:22px; margin-bottom:6px; display:block; }
.sum-label { font-size:14px; font-weight:700; color:var(--muted); }
.sum-card.ok .sum-label { color:var(--text); }
.sum-value { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); margin-top:3px; }
.sum-card.ok .sum-value { color:var(--accent2); }
.sum-empty { font-size:12px; color:var(--muted); font-style:italic; }
.json-block { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:18px; margin-bottom:18px; }
.json-lbl { font-family:'Space Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
pre { font-family:'Space Mono',monospace; font-size:11px; line-height:1.7; color:#a5b4fc; overflow-x:auto; white-space:pre; max-height:160px; overflow-y:auto; }
.export-row { display:flex; gap:10px; }
.btn-export { flex:1; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:#fff; border-radius:9px; cursor:pointer; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; padding:13px; transition:all 0.2s; }
.btn-export:hover { opacity:0.85; transform:translateY(-1px); box-shadow:0 8px 24px rgba(109,74,255,0.4); }
.btn-copy { background:transparent; border:1.5px solid var(--border); color:var(--muted); border-radius:9px; cursor:pointer; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; padding:13px 20px; transition:all 0.2s; }
.btn-copy:hover { border-color:var(--accent2); color:var(--text); }
.toast { position:fixed; bottom:20px; right:20px; background:var(--green); color:#000; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; padding:10px 18px; border-radius:7px; z-index:999; opacity:0; transform:translateY(6px); transition:all 0.3s; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>
<div class="bg-glow" id="bgGlow"></div>

<div class="loader-screen" id="loaderScreen">
  <div class="spinner"></div>
  <div class="loader-text">Chargement du configurateur...</div>
</div>

<div class="app hidden" id="mainApp">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <span class="brand-name">Pack Config</span>
    </div>
    <div class="stepper" id="stepper"></div>
    <div style="width:80px"></div>
  </div>
  <div class="pages" id="pages"></div>
  <div class="page-nav">
    <div class="nav-info">Étape <span id="navCur">1</span> / <span id="navTot">1</span></div>
    <div class="nav-btns">
      <button class="btn-back" id="btnBack" onclick="goBack()">← Retour</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">Suivant →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let categories = [];
let selections = {};
let currentPage = 0;

async function init() {
  try {
    const res = await fetch('/api/categories');
    const data = await res.json();
    if (data.categories && Array.isArray(data.categories) && data.categories.length) {
      categories = data.categories;
    }
  } catch(e) {}

  if (!categories.length) {
    categories = [
      { key:'exemple', name:'Exemple', description:'Ajoute des catégories depuis le panel admin.', videoUrl:'', videoLabel:'', videoDesc:'', options:[{label:'Option A',value:'a',icon:'🅰️'},{label:'Option B',value:'b',icon:'🅱️'}] }
    ];
  }

  document.getElementById('loaderScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  render();
}

function totalPages() { return categories.length + 1; }

function render() { renderStepper(); renderPages(); renderNav(); updateGlow(); }

function renderStepper() {
  const items = [...categories.map((c,i)=>({label:c.name,i})), {label:'Résumé',i:categories.length}];
  document.getElementById('stepper').innerHTML = items.map((item,idx) => {
    const isDone = idx < categories.length ? !!selections[categories[idx].key] : false;
    const isActive = idx === currentPage;
    const cls = isActive?'active':isDone?'done':'';
    const dot = isDone&&!isActive?'✓':idx+1;
    const sep = idx<items.length-1?'<div class="step-sep"></div>':'';
    return `<div class="step ${cls}" onclick="goTo(${idx})"><div class="step-dot">${dot}</div><span class="step-label">${item.label}</span></div>${sep}`;
  }).join('');
}

function renderPages() {
  const c = document.getElementById('pages');
  c.innerHTML = '';
  categories.forEach((cat,i) => {
    const p = document.createElement('div');
    p.className='page'+(i===currentPage?' active':'');
    p.id='page-'+i;
    p.innerHTML=catHTML(cat,i);
    c.appendChild(p);
  });
  const s = document.createElement('div');
  s.className='page page-summary'+(currentPage===categories.length?' active':'');
  s.id='page-summary';
  s.innerHTML=summaryHTML();
  c.appendChild(s);
}

function catHTML(cat,i) {
  const sel=selections[cat.key];
  return `
    <div class="page-left">
      <div class="page-index">Catégorie ${String(i+1).padStart(2,'0')} / ${categories.length}</div>
      <h1 class="page-title">${cat.name}</h1>
      <p class="page-desc">${cat.description||''}</p>
      <div class="options-list">
        ${cat.options.map(opt=>`
          <div class="opt-card ${sel===opt.value?'selected':''}" onclick="pick('${cat.key}','${opt.value}')">
            <div class="opt-icon">${opt.icon||'📦'}</div>
            <div class="opt-body"><div class="opt-label">${opt.label}</div><div class="opt-val">${opt.value}</div></div>
            <div class="opt-radio"></div>
          </div>`).join('')}
      </div>
    </div>
    <div class="page-right">
      <div class="video-wrapper">
        <div class="video-area">${videoHTML(cat)}</div>
        <div class="video-meta">
          <div class="video-lbl">Vidéo de présentation</div>
          <div class="video-title-text">${cat.videoLabel||cat.name}</div>
          <div class="video-desc-text">${cat.videoDesc||''}</div>
        </div>
      </div>
    </div>`;
}

function videoHTML(cat) {
  if (!cat.videoUrl) return `<div class="video-placeholder"><div class="video-play-btn">▶</div><p>Aucune vidéo configurée</p></div>`;
  const yt=cat.videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if (yt) return `<iframe src="https://www.youtube.com/embed/${yt[1]}" frameborder="0" allowfullscreen></iframe>`;
  return `<video src="${cat.videoUrl}" controls></video>`;
}

function summaryHTML() {
  const done=categories.filter(c=>selections[c.key]).length;
  return `
    <div class="summary-wrap">
      <h1>Récap & Export</h1>
      <p class="summary-sub">Vérifie tes sélections puis génère le fichier JSON pour ton bot.</p>
      <div class="pack-name-row">
        <label>Nom du pack</label>
        <input id="packName" type="text" value="mon-pack" oninput="refreshJSON()">
      </div>
      <div class="summary-grid">
        ${categories.map((cat,i)=>{
          const val=selections[cat.key];
          const opt=val?cat.options.find(o=>o.value===val):null;
          if(opt) return `<div class="sum-card ok" onclick="goTo(${i})"><div class="sum-cat"><span>${cat.name}</span><span class="sum-check">✓</span></div><span class="sum-icon">${opt.icon||'📦'}</span><div class="sum-label">${opt.label}</div><div class="sum-value">${opt.value}</div></div>`;
          return `<div class="sum-card" onclick="goTo(${i})"><div class="sum-cat"><span>${cat.name}</span></div><span class="sum-icon" style="opacity:0.3">❓</span><div class="sum-empty">Non sélectionné</div></div>`;
        }).join('')}
      </div>
      <div class="json-block">
        <div class="json-lbl"><span>config.json</span><span style="color:${done===categories.length?'var(--green)':'var(--muted)'}">${done}/${categories.length} complétés</span></div>
        <pre id="jsonPre">${esc(JSON.stringify(buildJSON('mon-pack'),null,2))}</pre>
      </div>
      <div class="export-row">
        <button class="btn-export" onclick="exportJSON()">⬇ Télécharger config.json</button>
        <button class="btn-copy" onclick="copyJSON()">Copier</button>
      </div>
    </div>`;
}

function renderNav() {
  document.getElementById('navCur').textContent=currentPage+1;
  document.getElementById('navTot').textContent=totalPages();
  document.getElementById('btnBack').style.display=currentPage===0?'none':'';
  const btn=document.getElementById('btnNext');
  if(currentPage===totalPages()-1){btn.style.display='none';}
  else{btn.style.display='';btn.textContent=currentPage===totalPages()-2?'Voir le résumé →':'Suivant →';}
}

function goTo(i) {
  const oldId=currentPage===categories.length?'page-summary':'page-'+currentPage;
  const old=document.getElementById(oldId);
  if(old){old.classList.add('exit');setTimeout(()=>{old.classList.remove('exit','active');},420);}
  currentPage=i;
  const newEl=document.getElementById(i===categories.length?'page-summary':'page-'+i);
  if(newEl) setTimeout(()=>newEl.classList.add('active'),10);
  renderStepper();renderNav();updateGlow();
  if(i===categories.length) setTimeout(refreshJSON,60);
}
function goNext(){if(currentPage<totalPages()-1)goTo(currentPage+1);}
function goBack(){if(currentPage>0)goTo(currentPage-1);}

function pick(key,val) {
  if(selections[key]===val) delete selections[key]; else selections[key]=val;
  const cat=categories.find(c=>c.key===key);
  const el=document.getElementById('page-'+categories.indexOf(cat));
  if(el) el.querySelectorAll('.opt-card').forEach(c=>{c.classList.toggle('selected',c.querySelector('.opt-val').textContent===selections[key]);});
  renderStepper();
}

function buildJSON(name) {
  const obj={pack_name:name||'mon-pack',generated_at:new Date().toISOString(),selections:{}};
  categories.forEach(cat=>{
    const val=selections[cat.key];
    const opt=val?cat.options.find(o=>o.value===val):null;
    obj.selections[cat.key]=val?{value:val,label:opt?.label||val,icon:opt?.icon||''}:null;
  });
  return obj;
}
function refreshJSON(){const n=document.getElementById('packName')?.value||'mon-pack';const p=document.getElementById('jsonPre');if(p)p.textContent=JSON.stringify(buildJSON(n),null,2);}
function exportJSON(){const n=document.getElementById('packName')?.value||'config';const b=new Blob([JSON.stringify(buildJSON(n),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n+'.json';a.click();toast('✓ config.json téléchargé !');}
function copyJSON(){const n=document.getElementById('packName')?.value||'mon-pack';navigator.clipboard.writeText(JSON.stringify(buildJSON(n),null,2)).then(()=>toast('✓ Copié !'));}

const glows=['rgba(109,74,255,0.12)','rgba(176,109,255,0.1)','rgba(61,220,132,0.08)','rgba(255,120,160,0.08)','rgba(100,180,255,0.08)'];
function updateGlow(){document.getElementById('bgGlow').style.background=`radial-gradient(ellipse at 75% 25%, ${glows[currentPage%glows.length]} 0%, transparent 60%)`;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
</body>
</html>
