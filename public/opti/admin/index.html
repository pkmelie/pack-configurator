<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — FiveM Crash DB</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#05080d;--bg2:#0a0d14;--bg3:#0f1420;--border:#1a2535;--admin:#a855f7;--text:#c0cce0;--text-dim:#4a6070;--danger:#ff3860;--success:#23d160;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(168,85,247,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.7) 100%);pointer-events:none;z-index:1;}

.wrap{position:relative;z-index:2;width:100%;max-width:400px;padding:20px;}
.card{background:var(--bg2);border:1px solid rgba(168,85,247,0.22);border-radius:14px;padding:40px 36px;box-shadow:0 0 60px rgba(168,85,247,0.1),0 20px 60px rgba(0,0,0,0.5);}

.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--admin),#6600cc);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;animation:pulse 3s ease infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(168,85,247,0.3)}50%{box-shadow:0 0 45px rgba(168,85,247,0.65)}}
.logo-title{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;letter-spacing:3px;color:var(--admin);}
.logo-sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-top:4px;font-family:'Share Tech Mono',monospace;}

.form-group{margin-bottom:20px;}
label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;font-family:'Share Tech Mono',monospace;}
.pw-wrap{position:relative;}
.pw-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 44px 12px 16px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;outline:none;transition:all 0.25s;letter-spacing:2px;}
.pw-input:focus{border-color:var(--admin);box-shadow:0 0 0 2px rgba(168,85,247,0.15);}
.pw-input.error{border-color:var(--danger);}
.pw-input.shake{animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px;transition:color 0.2s;}
.toggle-pw:hover{color:var(--admin);}

.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--admin),#6600cc);border:none;border-radius:8px;color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:3px;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 20px rgba(168,85,247,0.3);margin-top:4px;}
.btn-login:hover{box-shadow:0 6px 30px rgba(168,85,247,0.5);transform:translateY(-1px);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}

.error-msg{background:rgba(255,56,96,0.1);border:1px solid rgba(255,56,96,0.25);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--danger);font-family:'Share Tech Mono',monospace;margin-top:14px;display:none;text-align:center;}
.error-msg.show{display:block;}
.attempts-warn{font-size:10px;color:var(--danger);font-family:'Share Tech Mono',monospace;margin-top:8px;text-align:center;display:none;}

.footer{text-align:center;margin-top:22px;font-size:10px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;}
.footer a{color:var(--text-dim);text-decoration:none;border-bottom:1px solid var(--border);}
.footer a:hover{color:var(--admin);}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-title">ADMIN ACCESS</div>
      <div class="logo-sub">FiveM Crash Database</div>
    </div>

    <div class="form-group">
      <label>Mot de passe administrateur</label>
      <div class="pw-wrap">
        <input class="pw-input" type="password" id="pw-input"
          placeholder="••••••••••••"
          onkeydown="if(event.key==='Enter')login()"
          oninput="clearError()">
        <button class="toggle-pw" onclick="togglePw()" id="toggle-btn">👁️</button>
      </div>
    </div>

    <div class="attempts-warn" id="attempts-warn"></div>

    <button class="btn-login" id="login-btn" onclick="login()">
      <span id="btn-text">🔑 CONNEXION</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="footer">
    <a href="../index.html">← Retour au Crash Analyzer</a>
  </div>
</div>

<script>
let attempts = 0;
const MAX_ATTEMPTS = 5;
let locked = false;

function togglePw() {
  const inp = document.getElementById('pw-input');
  const btn = document.getElementById('toggle-btn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

function clearError() {
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('pw-input').classList.remove('error');
}

async function login() {
  if (locked) return;

  const pw = document.getElementById('pw-input').value;
  if (!pw) { showError('Entrer le mot de passe'); return; }

  const btn   = document.getElementById('login-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.style.display  = 'none';

  try {
    // ✅ Appel vers /api/login (ton endpoint existant dans api/login.js)
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, role: 'admin' }),
    });

    const data = await res.json();

    if (res.ok && data.success) {
      // Stocker le token dans sessionStorage (effacé à la fermeture du navigateur)
      sessionStorage.setItem('admin_token', data.token);
      sessionStorage.setItem('admin_ts',    Date.now().toString());

      // Feedback visuel puis redirect vers dashboard.html
      btnText.textContent = '✓ ACCÈS ACCORDÉ';
      btnText.style.display = 'block';
      spinner.style.display = 'none';
      btn.style.background  = 'linear-gradient(135deg,#23d160,#006622)';

      setTimeout(() => { window.location.href = '/dashboard/index.html'; }, 700);

    } else {
      // Échec
      attempts++;
      spinner.style.display = 'none';
      btnText.style.display = 'block';
      btn.disabled = false;

      const inp = document.getElementById('pw-input');
      inp.classList.add('error', 'shake');
      inp.value = '';
      setTimeout(() => inp.classList.remove('shake'), 400);

      if (attempts >= MAX_ATTEMPTS) {
        locked = true;
        btn.disabled = true;
        showError('⛔ Trop de tentatives — Réessayer dans 5 minutes');
        const warn = document.getElementById('attempts-warn');
        warn.style.display = 'block';
        warn.textContent   = `${attempts}/${MAX_ATTEMPTS} tentatives`;
        setTimeout(() => {
          locked = false; attempts = 0;
          btn.disabled = false;
          warn.style.display = 'none';
          clearError();
        }, 5 * 60 * 1000);
      } else {
        const rem = MAX_ATTEMPTS - attempts;
        showError(data.error || `Mot de passe incorrect — ${rem} tentative(s) restante(s)`);
        if (attempts >= 3) {
          const warn = document.getElementById('attempts-warn');
          warn.style.display = 'block';
          warn.textContent   = `${attempts}/${MAX_ATTEMPTS} tentatives`;
        }
      }
    }

  } catch (err) {
    spinner.style.display = 'none';
    btnText.style.display = 'block';
    btn.disabled = false;
    showError('Erreur réseau — Vérifier que Vercel est démarré');
    console.error('[LOGIN]', err);
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

document.getElementById('pw-input').focus();
</script>
</body>
</html>
