<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dodge! — Mini Jeu</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
  body {
    background:#f8f7fc; display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh;
    font-family:'Plus Jakarta Sans',sans-serif; overflow:hidden;
    user-select:none;
  }

  h1 {
    font-family:'Fredoka',sans-serif; font-size:clamp(1.5rem,5vw,2.4rem);
    color:#181826; margin-bottom:0.4rem; letter-spacing:-0.01em;
  }
  .tagline { font-size:0.85rem; color:#6b6678; margin-bottom:1.1rem; }

  #wrap {
    position:relative; border-radius:20px; overflow:hidden;
    box-shadow:0 22px 50px -12px rgba(24,24,38,0.22);
  }
  canvas { display:block; }

  #hud {
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:0.7rem 1rem; pointer-events:none;
  }
  .hud-box {
    background:rgba(255,255,255,0.75); backdrop-filter:blur(8px);
    border-radius:10px; padding:4px 12px; font-size:0.78rem; font-weight:600;
    color:#181826; border:1px solid rgba(24,24,38,0.08);
  }
  .hud-score { font-family:'Fredoka',sans-serif; font-size:1rem; }

  /* OVERLAY */
  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:0.7rem;
    background:rgba(248,247,252,0.88); backdrop-filter:blur(10px);
    border-radius:20px;
  }
  #overlay.hidden { display:none; }
  .ov-emoji { font-size:3.2rem; margin-bottom:0.3rem; }
  .ov-title { font-family:'Fredoka',sans-serif; font-size:1.8rem; color:#181826; }
  .ov-sub { font-size:0.88rem; color:#6b6678; text-align:center; max-width:220px; line-height:1.5; }
  .ov-score { font-family:'Fredoka',sans-serif; font-size:1rem; color:#5b4bd6; margin-top:0.3rem; }
  .ov-btn {
    background:#181826; color:#fff; border:none;
    padding:0.7rem 2rem; border-radius:100px;
    font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:0.9rem;
    cursor:pointer; margin-top:0.5rem; transition:transform .15s;
  }
  .ov-btn:hover { transform:scale(1.03); }
  .ov-btn:active { transform:scale(0.97); }

  /* touches mobiles */
  .touch-hints {
    display:flex; gap:0.8rem; margin-top:0.8rem;
  }
  .th {
    background:rgba(24,24,38,0.07); border-radius:10px;
    padding:5px 14px; font-size:0.75rem; color:#6b6678; font-weight:600;
  }

  /* footer */
  .credits { margin-top:0.9rem; font-size:0.75rem; color:#aaa; }
</style>
</head>
<body>

<h1>⚡ Dodge!</h1>
<p class="tagline">Évite les blocs. Survive le plus longtemps possible.</p>

<div id="wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="hud-box hud-score">Score : <span id="scoreEl">0</span></div>
    <div class="hud-box">Meilleur : <span id="bestEl">0</span></div>
  </div>

  <div id="overlay">
    <div class="ov-emoji" id="ovEmoji">⚡</div>
    <div class="ov-title" id="ovTitle">Dodge!</div>
    <div class="ov-sub" id="ovSub">Évite les blocs colorés. Plus tu tiens, plus c'est rapide.</div>
    <div class="ov-score" id="ovScore"></div>
    <button class="ov-btn" id="startBtn">Jouer !</button>
    <div class="touch-hints">
      <span class="th">← → Clavier</span>
      <span class="th">Touche gauche / droite</span>
    </div>
  </div>
</div>

<p class="credits">Appuie sur Espace pour relancer après game over.</p>

<script>
(function(){

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('scoreEl');
const bestEl  = document.getElementById('bestEl');
const ovTitle = document.getElementById('ovTitle');
const ovSub   = document.getElementById('ovSub');
const ovScore = document.getElementById('ovScore');
const ovEmoji = document.getElementById('ovEmoji');
const startBtn = document.getElementById('startBtn');

// ---- taille responsive ----
const MAX_W = 420, MAX_H = 600;
let W, H, scale;
function resize(){
  const vw = Math.min(window.innerWidth - 24, MAX_W);
  const vh = Math.min(window.innerHeight - 200, MAX_H);
  scale = Math.min(vw/MAX_W, vh/MAX_H);
  W = MAX_W * scale; H = MAX_H * scale;
  canvas.width = W; canvas.height = H;
  document.getElementById('wrap').style.width  = W+'px';
  document.getElementById('wrap').style.height = H+'px';
}
resize();
window.addEventListener('resize', resize);

// ---- palette ----
const COLORS = ['#f1542f','#5b4bd6','#0ea89a','#3d74e0','#e8447b','#f59e0b'];
const PLAYER_COLOR = '#181826';

// ---- état ----
let gameRunning = false;
let score = 0, best = 0, frame = 0;
let player = {};
let blocks = [];
let particles = [];
let keys = {};
let touchDir = 0; // -1 left, 1 right, 0 none

// ---- init ----
function init(){
  score = 0; frame = 0; blocks = []; particles = [];
  player = {
    x: W/2, y: H - 50*scale,
    w: 36*scale, h: 36*scale,
    vx: 0, speed: 4*scale,
    alive: true
  };
}

function startGame(){
  init();
  overlay.classList.add('hidden');
  gameRunning = true;
  loop();
}

startBtn.addEventListener('click', startGame);

// ---- contrôles ----
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if((e.key === ' ' || e.key === 'Space') && !gameRunning){ startGame(); }
});
window.addEventListener('keyup', e => keys[e.key] = false);

// touch : touche gauche ou droite de l'écran
const wrap = document.getElementById('wrap');
wrap.addEventListener('touchstart', e => {
  const x = e.touches[0].clientX;
  const rect = canvas.getBoundingClientRect();
  touchDir = x < rect.left + rect.width/2 ? -1 : 1;
}, {passive:true});
wrap.addEventListener('touchend', () => touchDir = 0, {passive:true});

// ---- spawn blocs ----
function spawnBlock(){
  const cols = COLORS;
  const bw = (30 + Math.random()*50) * scale;
  const bh = (18 + Math.random()*22) * scale;
  const x  = Math.random() * (W - bw);
  const speedBase = 2 + (score / 400);
  const vy = (speedBase + Math.random()*1.5) * scale;
  blocks.push({
    x, y:-bh, w:bw, h:bh, vy,
    color: cols[Math.floor(Math.random()*cols.length)],
    rot: (Math.random()-0.5)*0.3,
    curRot:0
  });
}

// ---- particules ----
function explode(x, y, color){
  for(let i=0;i<18;i++){
    const a = Math.random()*Math.PI*2;
    const s = (2+Math.random()*4)*scale;
    particles.push({
      x, y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1*scale,
      r: (3+Math.random()*4)*scale,
      alpha:1, color, dead:false
    });
  }
}

// ---- update ----
function update(){
  frame++;
  score++;
  scoreEl.textContent = score;

  // mouvement joueur
  let dx = 0;
  if(keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if(keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if(touchDir !== 0) dx = touchDir;

  player.vx = dx * player.speed;
  player.x += player.vx;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));

  // spawn
  const spawnRate = Math.max(12, 48 - Math.floor(score/250)*2);
  if(frame % spawnRate === 0) spawnBlock();

  // blocs
  for(let i=blocks.length-1;i>=0;i--){
    const b = blocks[i];
    b.y += b.vy;
    b.curRot += b.rot * 0.04;

    if(b.y > H + b.h){ blocks.splice(i,1); continue; }

    // collision AABB
    const px = player.x - player.w/2, py = player.y - player.h/2;
    const pw = player.w, ph = player.h;
    const margin = 4*scale;
    if( px+margin < b.x+b.w &&
        px+pw-margin > b.x &&
        py+margin < b.y+b.h &&
        py+ph-margin > b.y ){
      player.alive = false;
      explode(player.x, player.y, PLAYER_COLOR);
      blocks.forEach(bl => explode(bl.x+bl.w/2, bl.y+bl.h/2, bl.color));
    }
  }

  // particules
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2*scale;
    p.alpha -= 0.025;
    p.vx *= 0.95;
    if(p.alpha <= 0) p.dead = true;
  });
  particles = particles.filter(p => !p.dead);
}

// ---- dessin ----
function draw(){
  ctx.clearRect(0,0,W,H);

  // fond dégradé léger
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#f8f7fc');
  grd.addColorStop(1,'#ede9fa');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // lignes de grille décoratives
  ctx.strokeStyle = 'rgba(91,75,214,0.05)';
  ctx.lineWidth = 1;
  for(let xx=0;xx<W;xx+=40*scale){
    ctx.beginPath(); ctx.moveTo(xx,0); ctx.lineTo(xx,H); ctx.stroke();
  }
  for(let yy=0;yy<H;yy+=40*scale){
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke();
  }

  // blocs
  blocks.forEach(b => {
    ctx.save();
    ctx.translate(b.x + b.w/2, b.y + b.h/2);
    ctx.rotate(b.curRot);
    ctx.fillStyle = b.color;
    roundRect(ctx, -b.w/2, -b.h/2, b.w, b.h, 8*scale);
    ctx.fill();
    ctx.restore();
  });

  // joueur
  if(player.alive){
    const bounce = Math.sin(frame*0.25)*2*scale;
    const px = player.x, py = player.y + bounce;

    // ombre
    ctx.save();
    ctx.globalAlpha=0.12;
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.ellipse(px, py+player.h/2+3*scale, player.w/2*0.8, 5*scale, 0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // corps
    ctx.save();
    ctx.fillStyle = PLAYER_COLOR;
    roundRect(ctx, px-player.w/2, py-player.h/2, player.w, player.h, 10*scale);
    ctx.fill();

    // yeux
    const ew = 6*scale, ey_off = -4*scale;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(px-7*scale, py+ey_off, ew/2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px+7*scale, py+ey_off, ew/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle=PLAYER_COLOR==='#181826'?'#5b4bd6':'#181826';
    ctx.beginPath(); ctx.arc(px-7*scale+(player.vx>0?2:-2)*scale, py+ey_off, ew/4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px+7*scale+(player.vx>0?2:-2)*scale, py+ey_off, ew/4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // particules
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // barre de progression "vitesse" en bas
  const pct = Math.min(score/600, 1);
  ctx.fillStyle='rgba(91,75,214,0.12)';
  ctx.fillRect(0, H-4*scale, W, 4*scale);
  ctx.fillStyle='#5b4bd6';
  ctx.fillRect(0, H-4*scale, W*pct, 4*scale);
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ---- game over ----
function gameOver(){
  gameRunning = false;
  if(score > best) best = score;
  bestEl.textContent = best;

  ovEmoji.textContent = '💥';
  ovTitle.textContent = 'Game Over';
  ovSub.textContent   = 'Les blocs t\'ont eu !';
  ovScore.textContent = `Score : ${score} | Meilleur : ${best}`;
  startBtn.textContent = 'Rejouer';
  overlay.classList.remove('hidden');
}

// ---- boucle ----
let raf;
function loop(){
  if(!gameRunning) return;
  update();
  draw();

  if(!player.alive){
    draw(); // un dernier frame avec les particules
    setTimeout(gameOver, 800);
    return;
  }
  raf = requestAnimationFrame(loop);
}

// ---- premier rendu (sans jeu lancé) ----
(function idle(){
  if(gameRunning) return;
  ctx.clearRect(0,0,W,H);
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#f8f7fc'); grd.addColorStop(1,'#ede9fa');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  // blocs décoratifs qui tombent en arrière-plan
  const t = Date.now()/1000;
  COLORS.forEach((c,i)=>{
    const bw=44*scale, bh=24*scale;
    const x = (i/COLORS.length)*W + Math.sin(t+i)*20*scale;
    const y = ((t*60 + i*120) % (H+bh)) - bh;
    ctx.save(); ctx.fillStyle=c; ctx.globalAlpha=0.25;
    roundRect(ctx,x,y,bw,bh,8*scale); ctx.fill(); ctx.restore();
  });
  requestAnimationFrame(idle);
})();

})();
</script>
</body>
</html>
